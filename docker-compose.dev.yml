services:
  autocommit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
    container_name: git-autocommit
    env_file:
      - .env
    volumes:
      - ${REPOS_HOST_PATH:-./watched-repos}:/repos
      - ./src:/app/src
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; p=os.getenv('HEALTH_PORT','8080'); urllib.request.urlopen(f'http://127.0.0.1:{p}/healthz', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
